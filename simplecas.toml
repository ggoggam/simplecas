# simplecas configuration. Every field can be overridden with env vars, e.g.
#   SIMPLECAS__DATABASE__URL=postgres://…
#   SIMPLECAS__STORAGE__BACKEND=s3
[server]
bind = "0.0.0.0:9000"
region = "us-east-1"

[database]
url = "postgres://postgres:postgres@localhost:55432/simplecas"
max_connections = 16

# Storage backend. Swap `backend` to s3 / gcs / azblob and fill the matching
# fields; the logical blob layout is identical across all of them.
[storage]
backend = "fs"
root = "./data"

# [storage]
# backend = "s3"
# bucket = "my-cas-bucket"
# region = "us-east-1"
# endpoint = "https://s3.amazonaws.com"   # or a MinIO/R2 endpoint
# access_key_id = "…"
# secret_access_key = "…"

# S3 gateway auth. Disabled = anonymous access (fine behind private ingress or
# for the bundled PWA). Enable to require SigV4-signed requests.
[auth]
enabled = false
access_key_id = "simplecas"
secret_access_key = "simplecas-secret"

# OIDC single sign-on for the human surface (the /ui PWA and /api admin API).
# Disabled by default; the S3 gateway at / keeps its own SigV4 auth regardless.
# Sessions are stateless signed cookies, so no session table and no shared
# state — every instance behind the load balancer just needs the same
# session_secret. Uncomment and fill in to require sign-in:
#
# [oidc]
# enabled = true
# public_url = "https://cas.example.com"      # used to derive redirect URIs
# session_secret = "change-me-to-32+-random-bytes"
# session_ttl_secs = 86400
# # Optional allowlist. Empty = admit anyone who authenticates. When set, the
# # (verified) email must match a domain or address here.
# allowed_domains = ["example.com"]
# allowed_emails = []
#
# [[oidc.providers]]
# id = "google"                                # slug used in the redirect URI
# name = "Google"                              # label on the login button
# issuer = "https://accounts.google.com"
# client_id = "…"
# client_secret = "…"                          # omit for public (PKCE) clients
# scopes = ["openid", "email", "profile"]
#
# Redirect URI to register with the provider:
#   <public_url>/auth/oidc/<id>/callback   e.g. https://cas.example.com/auth/oidc/google/callback

[gc]
interval_secs = 60
grace_secs = 300
# How long a multipart upload may sit inactive (no initiation or new part)
# before it's abandoned and its staged parts reclaimed. Default: 86400 (24h).
multipart_expiry_secs = 86400
